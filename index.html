<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Mortgage Repayment Calculator</title>
  </head>
  <body>
    <main class="calculator">
      <!-- Left Section -->

      <section class="calculator__form">
        <div class="form-header">
          <h1>Mortgage Calculator</h1>

          <a href="#" id="clear-btn">Clear All</a>
        </div>

        <form id="mortgage-form">
          <!-- Mortgage Amount -->
          <div class="form-group">
            <label for="amount">Mortgage Amount</label>

            <div class="input-group">
              <span>£</span>

              <input type="number" id="amount" placeholder="" />
            </div>
          </div>

          <!-- Two Inputs -->
          <div class="double-input">
            <div class="form-group">
              <label for="term">Mortgage Term</label>

              <div class="input-group">
                <input type="number" id="term" />

                <span>years</span>
              </div>
            </div>

            <div class="form-group">
              <label for="rate">Interest Rate</label>

              <div class="input-group">
                <input type="number" id="rate" step="0.01" />

                <span>%</span>
              </div>
            </div>
          </div>

          <!-- Mortgage Type -->
          <div class="form-group">
            <label>Mortgage Type</label>

            <div class="radio-option">
              <input
                type="radio"
                id="repayment"
                name="type"
                value="repayment"
              />

              <label for="repayment">Repayment</label>
            </div>

            <div class="radio-option">
              <input
                type="radio"
                id="interest"
                name="type"
                value="interest-only"
              />

              <label for="interest"> Interest Only </label>
            </div>
          </div>

          <button type="submit" class="calculate-btn">
            <img src="./assets/images/icon-calculator.svg" alt="" />

            Calculate Repayments
          </button>
        </form>
      </section>

      <!-- Right Section -->
      <section class="calculator__results">
        <img src="./assets/images/illustration-empty.svg" alt="" />

        <h2>Results shown here</h2>

        <p>
          Complete the form and click "calculate repayments" to see what your
          monthly repayments would be.
        </p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
